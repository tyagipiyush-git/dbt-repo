# This file contains the properities level configuration for the models in the bronze layer. This file is optional, but it is a good place to centralize configuration for all models in this layer. For example, if we wanted to materialize all models in this layer as views, we could set that here instead of in each individual model file (known as block level configuration).
VERSION: 2

models:
  # Model name must match the filename of a model -- including case sensitivity
  - name: bronze_sales
    config:
      materialized: table
    
    columns:
      - name: sales_id
        data_tests:
          - not_null
          - unique

      - name: gross_amount
        data_tests:
          - generic_non_negative

  - name: bronze_customer
    config:
      materialized: view

# About dbt tests:
# dbt tests are used to ensure data quality and integrity in your data models. They allow you to define and enforce rules for your data, such as:
# - Checking for null values in critical columns (`not_null` test).
# - Ensuring uniqueness of values in a column (`unique` test).
# - Validating that column values fall within an expected set (`accepted_values` test).
# - Custom tests for more complex data validation logic.
# These tests help identify data issues early and ensure that your data pipelines produce reliable and accurate results.

  - name: bronze_store
    config:
      materialized: table
    columns:
      - name: store_sk
        description: "The unique identifier for each store."
        data_tests:
          - not_null
          - unique
      - name: store_name
        description: "The name of the store."
        data_tests:
          - accepted_values:
              values: ["MegaMart Manhattan", "MegaMart Brooklyn", "MegaMart Austin", "MegaMart San Jose", "MegaMart Toronto"]
      - name: country
        description: "The location of the store."
        data_tests:
          - not_null
          
